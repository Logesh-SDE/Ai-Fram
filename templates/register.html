{% extends "base.html" %}

{% block title %}Register - AI-Farm{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box register-box">
        <div class="auth-header">
            <i class="fas fa-seedling fa-3x"></i>
            <h2>Join AI-Farm</h2>
            <p>Start your smart farming journey today</p>
        </div>
        
        <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Username *</label>
                    <input type="text" id="username" name="username" required placeholder="Choose a username">
                </div>
                
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email *</label>
                    <input type="email" id="email" name="email" required placeholder="your.email@example.com">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password *</label>
                <input type="password" id="password" name="password" required placeholder="Create a strong password">
            </div>
            
            <div class="form-group">
                <label for="full_name"><i class="fas fa-id-card"></i> Full Name</label>
                <input type="text" id="full_name" name="full_name" placeholder="Your full name">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="farm_location"><i class="fas fa-map-marker-alt"></i> Farm Location</label>
                    <input type="text" id="farm_location" name="farm_location" placeholder="City, State">
                </div>
                
                <div class="form-group">
                    <label for="farm_size"><i class="fas fa-chart-area"></i> Farm Size (acres)</label>
                    <input type="number" step="0.1" id="farm_size" name="farm_size" placeholder="e.g., 5.5">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}">Sign in here</a></p>
        </div>
    </div>
</div>
{% endblock %}
